name: GitHub Metrics

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  github-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub stats SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: icaoberg
          filename: assets/github-stats.svg
          base: header, activity, community, repositories
          output_action: commit

  top-languages:
    runs-on: ubuntu-latest
    steps:
      - name: Generate top languages SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: icaoberg
          filename: assets/top-langs.svg
          base: ""
          plugin_languages: yes
          plugin_languages_count: 10
          plugin_languages_ignored: html, css, c, m
          plugin_languages_details: percentage
          plugin_languages_type: programming
          output_action: commit
